services:
  - type: web
    name: consilium-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    rootDir: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTH_PROVIDER
        value: supabase
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: JOB_RUNNER_ENABLED
        value: "false"

  - type: worker
    name: consilium-worker
    env: docker
    dockerfilePath: ./backend/Dockerfile
    rootDir: .
    dockerCommand: python -m app.worker
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTH_PROVIDER
        value: supabase
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: JOB_RUNNER_ENABLED
        value: "true"
